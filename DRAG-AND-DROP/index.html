<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cabin Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Simple Kanban Board</h1>
      <div class="Board">
        <!--First List-->
        <div class="list" id="list1">
          <h2>To Do</h2>
          <div class="card" id="card1" draggable="true">Wash dishes</div>
          <div class="card" draggable="true" id="card2">Buy groceries</div>
        </div>
        <!--Second List-->
        <div class="list" id="list2">
          <h2>In Progress</h2>
          <div class="card">Learn to code</div>
        </div>
        <!-- Third List -->
        <div class="list" id="list3">
          <h2>Done</h2>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
