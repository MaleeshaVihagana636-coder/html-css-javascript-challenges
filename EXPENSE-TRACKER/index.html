<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="Container">
      <h1>Expense Tracker</h1>
      <div class="balance-container">
        <h2>Your Balance</h2>
        <h3 id="balance"><span>$0.00</span></h3>
        <div class="sammary">
          <div class="income">
            <h3>Income</h3>
            <p id="income">$0.00</p>
          </div>
          <div class="expense">
            <h3>Expense</h3>
            <p id="expense">$0.00</p>
          </div>
        </div>
      </div>
      <div class="main-content">
        <div class="transction-container">
          <h2>Transction</h2>
          <ul id="transction-list">
            <!--!Transction Will be insert Here-->
          </ul>
        </div>
        <div class="form-container">
          <h2>Add Transaction</h2>
          <form id="form">
            <div class="form-Group">
              <label for="description">Transaction Name</label>
              <input
                type="text"
                id="description"
                placeholder="Enter text..."
                required
              />
            </div>
            <div class="form-Group">
              <label for="amount">Amount</label>
              <input
                type="number"
                id="amount"
                placeholder="Enter The Amount...."
                required
              />
              <small>Use negative (-) for expenses</small>
            </div>

            <button type="submit" id="btn">Add transaction</button>
          </form>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
