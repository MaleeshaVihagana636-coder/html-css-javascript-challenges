<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUIZ GAME</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="Container">
      <div class="screen active" id="start-screen">
        <h1>QUIZ Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>
      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question"></span> of
              <span id="total-questions">5</span>
            </p>
            <p>Score: <span id="score">0</span></p>
          </div>
        </div>
        <div class="answer-container" id="answer-container">
          <!-- Answer buttons will be insterted here from our js code
            later at some point -->
        </div>
        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>
      <div class="screen result-screen" id="result-screen">
        <h1>Quiz Result</h1>
        <div class="result-info">
          <p>
            You Scored <span id="final-score"></span> Out of
            <span id="max-score"></span>
          </p>
          <div id="result-message">Keep studying! You'll get better!</div>
        </div>
        <button id="restart-btn">Restart Quiz</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
