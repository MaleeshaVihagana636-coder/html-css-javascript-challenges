<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="Container">
      <h1>Color Palette Generator</h1>
      <button id="generate-btn">
        <i class="fas fa-sync-alt"></i>
        Generate Palette
      </button>
      <div class="palettes-container">
        <!-- !Color Box 1 -->
        <div class="color-box">
          <div class="color" style="background-color: #f0f8ff"></div>
          <div class="color-info">
            <span class="color-code">#F0F8FF</span>
            <i class="far fa-copy copy-btn" title="Copy To Clipboard"></i>
          </div>
        </div>
        <!-- !Color Box 2 -->
        <div class="color-box">
          <div class="color" style="background-color: #25669e"></div>
          <div class="color-info">
            <span class="color-code">#25669E</span>
            <i class="far fa-copy copy-btn" title="Copy To Clipboard"></i>
          </div>
        </div>
        <!-- !Color Box 3 -->
        <div class="color-box">
          <div class="color" style="background-color: #33618a"></div>
          <div class="color-info">
            <span class="color-code">#33618A</span>
            <i class="far fa-copy copy-btn" title="Copy To Clipboard"></i>
          </div>
        </div>
        <!-- !Color Box 4 -->
        <div class="color-box">
          <div class="color" style="background-color: #f0f8ff"></div>
          <div class="color-info">
            <span class="color-code">#F0F8FF</span>
            <i class="far fa-copy copy-btn" title="Copy To Clipboard"></i>
          </div>
        </div>
        <!-- !Color Box 5  -->
        <div class="color-box">
          <div class="color" style="background-color: #f0f8ff"></div>
          <div class="color-info">
            <span class="color-code">#F0F8FF</span>
            <i class="far fa-copy copy-btn" title="Copy To Clipboard"></i>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
